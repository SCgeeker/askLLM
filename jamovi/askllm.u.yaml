title: Ask LLM about your data
name: askllm
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables to describe
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: question
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: includeSummary
      - type: CheckBox
        name: submit
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: provider
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: model
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: baseUrl
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: maxLevels
        format: number
