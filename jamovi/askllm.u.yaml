title: Ask LLM about your data
name: askllm
jus: '3.0'
stage: 0
compilerMode: tame
events:
    loaded: loaded
    updated: updated
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables to describe
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
  - type: Label
    label: Your question
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: TextBox
            name: question
            label: ''
            format: string
            width: largest
            stretchFactor: 1
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: includeSummary
      - type: CheckBox
        name: submit
  - type: CollapseBox
    label: LLM settings
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: provider
          - type: TextBox
            name: model
            format: string
            width: largest
          - type: TextBox
            name: baseUrl
            format: string
            width: largest
          - type: TextBox
            name: maxLevels
            format: number
